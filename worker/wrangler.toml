name = "bezzie-demo-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
AUTH0_DOMAIN = ""       # e.g. your-tenant.auth0.com
AUTH0_CLIENT_ID = ""    # Auth0 Application Client ID
AUTH0_AUDIENCE = ""     # e.g. https://api.bezzie-demo.com
APP_BASE_URL = ""       # e.g. https://bezzie-demo.pages.dev
UPSTREAM_URL = ""       # URL of the upstream Worker

[[kv_namespaces]]
binding = "SESSION_KV"
id = ""                 # fill in after running: wrangler kv namespace create SESSION_KV
