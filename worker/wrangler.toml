name = "bezzie-demo-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Optional: add a custom domain once deployed
# routes = [
#   { pattern = "your-domain.com", custom_domain = true }
# ]

[assets]
directory = "../frontend/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"


[vars]
AUTH0_DOMAIN = ""       # e.g. your-tenant.us.auth0.com
AUTH0_CLIENT_ID = ""    # from your Auth0 application
AUTH0_AUDIENCE = ""     # e.g. https://api.your-project.com
APP_BASE_URL = ""       # e.g. https://bezzie-demo-worker.<account>.workers.dev or your custom domain
UPSTREAM_URL = ""       # URL of your deployed upstream worker

[[kv_namespaces]]
binding = "SESSION_KV"
id = ""           # fill in after: wrangler kv namespace create SESSION_KV
preview_id = ""   # fill in after: wrangler kv namespace create SESSION_KV --preview
